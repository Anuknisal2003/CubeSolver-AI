name: rubik_solver
description: Rubik's Cube Scanner & Solver with Firebase

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^2.24.2
  firebase_auth: ^4.16.0
  cloud_firestore: ^4.14.0
  firebase_storage: ^11.6.0

  # Camera & Image Processing
  camera: ^0.10.5+9
  image: ^4.1.7
  image_picker: ^1.0.7

  # Google ML Kit for color detection
  google_mlkit_image_labeling: ^0.9.0

  # State management
  provider: ^6.1.2
  riverpod: ^2.4.10
  flutter_riverpod: ^2.4.10

  # UI
  flutter_animate: ^4.5.0
  lottie: ^3.1.0
  cupertino_icons: ^1.0.6
  flutter_colorpicker: ^1.0.3
  smooth_page_indicator: ^1.1.0
  gap: ^3.0.1

  # Utils
  permission_handler: ^11.3.0
  uuid: ^4.3.3
  intl: ^0.19.0
  shared_preferences: ^2.2.3
  http: ^1.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
